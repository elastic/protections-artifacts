not _arraysearch(process.thread.Ext.call_stack, $entry,
                 $entry.symbol_info like
                                     ("c:\\windows\\*\\ntdll.dll!Ldr*",
                                      "c:\\windows\\*\\ntdll.dll!RtlAllocateHeap*",
                                      "c:\\windows\\sys?????\\ntdll.dll!RtlFreeHeap*",
                                      "c:\\windows\\sys?????\\ntdll.dll!RtlReAllocateHeap*",
                                      "c:\\windows\\sys?????\\ntdll.dll!RtlUnlockHeap*",
                                      "c:\\windows\\sys?????\\ntdll.dll+0x*", 
                                      "c:\\windows\\sys*\\kernelbase.dll!VirtualAlloc*", 
                                      "c:\\windows\\system32\\kernelbase.dll!HeapCreat*")) and
not (process.executable : "\\\\?\\Volume{*}\\*.exe" and process.thread.Ext.call_stack_final_user_module.path like "?:\\*\\docker\\*\\windows\\*") and 
not process.thread.Ext.call_stack_summary like ("ntdll.dll|libpcre*.dll|libgobject-*.dll|ntdll.dll", "ntdll.dll|libffi-*.dll|libpython*.dll|ntdll.dll")
